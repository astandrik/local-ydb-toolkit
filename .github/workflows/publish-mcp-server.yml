name: Release MCP server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run build, tests, typecheck, and npm package dry-run.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-mcp-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['packages/mcp-server--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/mcp-server--tag_name'] }}
      version: ${{ steps.release.outputs['packages/mcp-server--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run typecheck

      - run: npm pack -w @astandrik/local-ydb-mcp --dry-run

      - name: Publish ${{ needs.release-please.outputs.tag_name }} to npm
        run: npm publish -w @astandrik/local-ydb-mcp

  dry-run:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run typecheck

      - run: npm pack -w @astandrik/local-ydb-mcp --dry-run
