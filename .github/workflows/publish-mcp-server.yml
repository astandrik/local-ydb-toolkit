name: Release MCP server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run build, tests, typecheck, and npm package dry-run.
        required: false
        default: true
        type: boolean
      publish_tag:
        description: Existing release tag to publish when dry_run is false, for example mcp-server-v0.5.0.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-mcp-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['packages--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages--tag_name'] }}
      version: ${{ steps.release.outputs['packages--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run typecheck

      - run: npm pack -w @astandrik/local-ydb-mcp --dry-run

      - name: Publish ${{ needs.release-please.outputs.tag_name }} to npm
        run: npm publish -w @astandrik/local-ydb-mcp

  publish-existing-release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.publish_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package version
        env:
          PUBLISH_TAG: ${{ inputs.publish_tag }}
        run: |
          package_version="$(node -p "require('./packages/mcp-server/package.json').version")"
          expected_tag="mcp-server-v${package_version}"
          if [ "${PUBLISH_TAG}" != "${expected_tag}" ]; then
            echo "publish_tag must match package version: expected ${expected_tag}, got ${PUBLISH_TAG}" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run typecheck

      - run: npm pack -w @astandrik/local-ydb-mcp --dry-run

      - name: Publish ${{ inputs.publish_tag }} to npm
        run: npm publish -w @astandrik/local-ydb-mcp

  dry-run:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run typecheck

      - run: npm pack -w @astandrik/local-ydb-mcp --dry-run
